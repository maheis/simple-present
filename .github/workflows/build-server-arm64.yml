name: CI - Build server arm64

on:
    release:
        types: [published]
    workflow_dispatch: {}

permissions:
    contents: write

jobs:
    server:
        name: Build server arm64
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: server/go.mod
                  cache: true
            - name: Verify Go toolchain
              run: |
                  which go
                  go version
            - name: Install server deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                    build-essential pkg-config libsqlite3-dev
            - name: Build server release
              working-directory: server
              env:
                  CGO_ENABLED: "1"
                  GOOS: linux
                  GOARCH: arm64
              run: go build -v -o simplepresent-server
            - name: Package server binary
              run: |
                  mkdir -p release_dist
                  mkdir -p release_dist/simplepresent-server
                  echo "Listing server build directories for diagnostics"
                  ls -la server || true
                  cp server/simplepresent-server release_dist/simplepresent-server/simplepresent-server || true
                  cp server/etc/config.json.example release_dist/simplepresent-server/config.json.example || true
                  cp server/deploy/install.sh release_dist/simplepresent-server/install.sh || true
                  chmod +x release_dist/simplepresent-server/install.sh || true
                  cd release_dist && zip -r simplepresent-server-arm64.zip simplepresent-server
            - name: Upload server artifact
              uses: actions/upload-artifact@v4
              with:
                  name: simplepresent-server
                  path: release_dist/simplepresent-server-arm64.zip
            - name: Upload server artifact to Release
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ github.event.release.upload_url }}
                  asset_path: release_dist/simplepresent-server-arm64.zip
                  asset_name: simplepresent-server-arm64.zip
                  asset_content_type: application/zip
