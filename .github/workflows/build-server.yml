name: Build server

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:
  build:
    name: Build (linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        go-version: [1.20]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install C toolchain and sqlite dev
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libsqlite3-dev

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go-version }}-

    - name: Build
      env:
        CGO_ENABLED: '1'
        GOARCH: ${{ matrix.arch }}
      run: |
        echo "Building for $GOARCH"
        go build -v -o simplepresent-${{ matrix.arch }} ./

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: simplepresent-${{ matrix.arch }}
        path: simplepresent-${{ matrix.arch }}

  release:
    name: Create Release (on tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: simplepresent-amd64
          path: ./artifacts

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
