name: CI - Build server

on:
    release:
        types: [published]
    workflow_dispatch: {}

permissions:
    contents: write

jobs:
    server:
        name: Build server
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Go
              uses: actions/setup-go@v4
              with:
                  go-version: 1.20
            - name: Install server deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                    build-essential pkg-config libsqlite3-dev
            - name: Go mod download
              working-directory: server
              run: go mod download
            - name: Build server release
              working-directory: server
              env:
                  CGO_ENABLED: "1"
                  GOOS: linux
                  GOARCH: amd64
              run: go build -v -o simplepresent-server
            - name: Package server binary
              run: |
                  mkdir -p release_dist
                  echo "Listing server build directories for diagnostics"
                  ls -la server || true
                  cp server/simplepresent-server release_dist/simplepresent-server || true
                  tar -czf release_dist/simplepresent-server.tar.gz -C release_dist simplepresent-server
            - name: Upload server artifact
              uses: actions/upload-artifact@v4
              with:
                  name: simplepresent-server
                  path: release_dist/simplepresent-server.tar.gz
            - name: Upload server artifact to Release
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ github.event.release.upload_url }}
                  asset_path: release_dist/simplepresent-server.tar.gz
                  asset_name: simplepresent-server.tar.gz
                  asset_content_type: application/gzip
