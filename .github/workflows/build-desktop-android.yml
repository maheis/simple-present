name: CI - Build Desktop & Android

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: Install Linux deps
        run: |
          sudo apt-get update
          # Core build deps + audio/gstreamer + notifications
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake \
            libgtk-3-dev libglib2.0-dev libfontconfig1-dev libx11-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libnotify-dev libasound2-dev libpulse-dev
      - name: Flutter pub get
        run: flutter pub get
      - name: Build Linux release
        run: flutter build linux --release
      - name: Package Linux bundle
        run: |
          mkdir -p release_dist
          echo "Listing build directories for diagnostics"
          ls -la build || true
          ls -la build/linux || true
          # try to find the release bundle under any architecture folder
          bundle_dir=$(find build/linux -type d -path '*/release/bundle' | head -n 1 || true)
          echo "Found bundle dir: ${bundle_dir}"
          if [ -n "${bundle_dir}" ] && [ -d "${bundle_dir}" ]; then
            tar -czf release_dist/simplepresent-linux.tar.gz -C "${bundle_dir}" .
          else
            echo "ERROR: build output not found: expected build/linux/**/release/bundle"
            find build/linux -maxdepth 3 -type d -printf '%p\n' || true
            exit 1
          fi
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplepresent-linux
          path: release_dist/simplepresent-linux.tar.gz
      - name: Upload Linux artifact to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release_dist/simplepresent-linux.tar.gz
          asset_name: simplepresent-linux.tar.gz
          asset_content_type: application/gzip

  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: Flutter pub get
        run: flutter pub get
      - name: Build Windows release
        run: flutter build windows --release
      - name: Package Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_dist | Out-Null
          Write-Host "Listing build directories for diagnostics"
          Get-ChildItem -Force build -ErrorAction SilentlyContinue | Select-Object -First 50
          # find the first runner\Release directory under build/windows (e.g. build/windows/x64/runner/Release)
          $found = Get-ChildItem -Path build/windows -Directory -Recurse -ErrorAction SilentlyContinue |
                   Where-Object { $_.FullName -match "\\runner\\Release$" } | Select-Object -First 1
          if ($found) {
              $src = $found.FullName
              Write-Host "Found runner release dir: $src"
              Compress-Archive -Path "$src\*" -DestinationPath "release_dist\simplepresent-windows.zip" -Force
          } else {
              Write-Host "ERROR: build output not found: expected build/windows/**/runner/Release"
              Get-ChildItem -Path build -Recurse -Force -ErrorAction SilentlyContinue | Select-Object -First 200
              exit 1
          }
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplepresent-windows
          path: release_dist/simplepresent-windows.zip
      - name: Upload Windows artifact to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release_dist/simplepresent-windows.zip
          asset_name: simplepresent-windows.zip
          asset_content_type: application/zip

