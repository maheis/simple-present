name: CI - Build Android App Bundle

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-aab:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: accept android licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: flutter pub get
        run: flutter pub get

      - name: restore keystore (from secret KEYSTORE_BASE64)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > ./android/app/keystore.jks

      - name: write android/key.properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p android
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF

      - name: verify release keystore is present
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is empty. The build would be debug-signed. Aborting to avoid uploading a debug-signed build." >&2
            exit 1
          fi

      - name: build app bundle
        run: flutter build appbundle --release

      - name: upload aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplepresent-aab
          path: build/app/outputs/bundle/release/*.aab
