name: CI - Build Linux

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake \
            libgtk-3-dev libglib2.0-dev libfontconfig1-dev libx11-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libnotify-dev libasound2-dev libpulse-dev
      - name: Flutter pub get
        run: flutter pub get
      - name: Build Linux release
        run: flutter build linux --release
      - name: Package Linux bundle
        run: |
          mkdir -p release_dist
          stage_dir="release_dist/simplepresent-linux"
          mkdir -p "${stage_dir}"
          echo "Listing build directories for diagnostics"
          ls -la build || true
          ls -la build/linux || true
          bundle_dir=$(find build/linux -type d -path '*/release/bundle' | head -n 1 || true)
          echo "Found bundle dir: ${bundle_dir}"
          if [ -n "${bundle_dir}" ] && [ -d "${bundle_dir}" ]; then
            cp -a "${bundle_dir}/." "${stage_dir}/"

            for doc in LICENSE README.md THIRD_PARTY_LICENSES.md; do
              if [ -f "${doc}" ]; then
                cp "${doc}" "${stage_dir}/${doc}"
              else
                echo "WARNING: ${doc} not found, skipping"
              fi
            done

            # Include client installer script if present
            if [ -f "deploy/install-client.sh" ]; then
              cp "deploy/install-client.sh" "${stage_dir}/install-client.sh"
              chmod +x "${stage_dir}/install-client.sh"
            else
              echo "Note: deploy/install-client.sh not found, skipping"
            fi

            # Include client uninstaller script if present
            if [ -f "deploy/uninstall-client.sh" ]; then
              cp "deploy/uninstall-client.sh" "${stage_dir}/uninstall-client.sh"
              chmod +x "${stage_dir}/uninstall-client.sh"
            else
              echo "Note: deploy/uninstall-client.sh not found, skipping"
            fi

            tar -czf release_dist/simplepresent-linux.tar.gz -C "${stage_dir}" .
          else
            echo "ERROR: build output not found: expected build/linux/**/release/bundle"
            find build/linux -maxdepth 3 -type d -printf '%p\n' || true
            exit 1
          fi
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplepresent-linux
          path: release_dist/simplepresent-linux.tar.gz
      - name: Upload Linux artifact to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release_dist/simplepresent-linux.tar.gz
          asset_name: simplepresent-linux.tar.gz
          asset_content_type: application/gzip
