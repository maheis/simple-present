name: simple_present
description: A minimal Flutter starter for the SimplePresent project.
publish_to: "none"
version: 0.8.9+49
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_localizations:
    sdk: flutter
  path_provider: ^2.0.11
  intl: ^0.20.2
  flutter_svg: ^1.1.1
  audioplayers: ^6.7.1
  cryptography: ^2.7.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  file_selector: ^1.1.0
  sembast: ^3.8.9+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.10.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/sounds/
  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic/OpenDyslexic-Regular.otf
        - asset: assets/fonts/OpenDyslexic/OpenDyslexic-Bold.otf
          weight: 700
    - family: NotoSans
      fonts:
        - asset: assets/fonts/Noto_Sans/static/NotoSans-Regular.ttf
        - asset: assets/fonts/Noto_Sans/static/NotoSans-Bold.ttf
          weight: 700
    - family: CourierPrime
      fonts:
        - asset: assets/fonts/Courier_Prime/CourierPrime-Regular.ttf
        - asset: assets/fonts/Courier_Prime/CourierPrime-Bold.ttf
          weight: 700

flutter_icons:
  android: true
  ios: false
  image_path: assets/icons/color_transparent_icon.png
  adaptive_icon_background: assets/icons/color_transparent_icon.png
  adaptive_icon_foreground: assets/icons/color_transparent_icon.png
